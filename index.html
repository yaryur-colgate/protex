<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Protex - Minijuego AR</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      /* FIJAR EL BODY */
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: fixed; 
      }

      /* =========================================
         INTERFAZ DE BIENVENIDA Y CARGA
         ========================================= */
      #welcome-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #ffffff;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease;
      }

      #portada-img {
        max-width: 70%;
        max-height: 35vh;
        object-fit: contain;
        margin-bottom: 20px;
        transition: transform 0.3s ease;
      }

      .ui-container {
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #loading-dots {
        display: flex;
        gap: 12px;
      }

      .dot {
        width: 16px;
        height: 16px;
        background-color: #003366;
        border-radius: 50%;
        animation: bounceDot 0.6s infinite alternate;
      }

      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounceDot {
        from { transform: translateY(0); opacity: 0.6; }
        to { transform: translateY(-15px); opacity: 1; }
      }

      #startButton {
        display: none;
        padding: 15px 40px;
        font-size: 18px;
        font-family: sans-serif;
        font-weight: bold;
        background-color: #003366;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0px 6px 12px rgba(0,0,0,0.15);
      }

      #countdown-text {
        display: none;
        font-size: 80px;
        font-family: sans-serif;
        font-weight: 900;
        color: #003366;
        text-align: center;
        text-transform: uppercase;
      }

      .bounce {
        animation: bounceAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes bounceAnim {
        0% { transform: scale(0.3); opacity: 0; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      .zoom-out {
        animation: zoomOutAnim 1s ease-in forwards;
      }

      @keyframes zoomOutAnim {
        0% { transform: scale(1); opacity: 1; }
        40% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(3); opacity: 0; }
      }
    </style>

    <script>
      // COMPONENTE DE MINIJUEGO ACTUALIZADO
      AFRAME.registerComponent('atrapar-modelo', {
        init: function () {
          // Inicializamos el contador de toques
          this.toques = 0;

          this.el.addEventListener('mousedown', (evento) => {
            this.toques++;
            
            // Siempre reproducimos el sonido al tocar
            const sonido = document.querySelector('#mi-sonido');
            if (sonido) {
              sonido.currentTime = 0; 
              sonido.play();
            }

            // Seleccionamos la imagen de fondo para cambiarla
            const fondoImagen = document.querySelector('#fondo-imagen');

            // Actualizamos la imagen de fondo según el número de toques
            if (this.toques === 1) {
              fondoImagen.setAttribute('src', '#img2');
              
              /* NUEVO: Ocultar la mano indicadora en el primer toque */
              const manoIndicadora = document.querySelector('#modelo-mano');
              if (manoIndicadora) {
                manoIndicadora.setAttribute('visible', 'false');
              }
              
            } else if (this.toques === 2) {
              fondoImagen.setAttribute('src', '#img3');
            } else if (this.toques === 3) {
              fondoImagen.setAttribute('src', '#img4');
            }

            if (this.toques < 3) {
              // --- LÓGICA DE MOVIMIENTO MÁS CONTROLADO ---
              
              // Eje X (Izquierda/Derecha): Se mueve un poco, entre -0.5 y 0.1
              const randomX = (Math.random() * 0.6) - 0.5; 
              
              // Eje Y (Arriba/Abajo): Nunca baja de 0. Varía entre 0.0 y 0.35 (solo sube un poco)
              const randomY = Math.random() * 0.35;
              
              // Eje Z (Adelante/Atrás): Originalmente era 0.4. Variará entre 0.2 y 0.5
              const randomZ = (Math.random() * 0.3) + 0.2; 
              
              // Aplicamos las nuevas coordenadas
              this.el.parentNode.setAttribute('position', `${randomX} ${randomY} ${randomZ}`);
              
            } else {
              // Al 3er toque: ¡Lo atrapamos!
              // 1. Ocultamos el contenedor del protex2
              this.el.parentNode.setAttribute('visible', 'false');
              
              // 2. Desactivamos la clase 'clickable'
              this.el.classList.remove('clickable');
              
              // 3. Mostramos y reproducimos el video
              const videoEl = document.querySelector('#a-video-entity');
              const htmlVideo = document.querySelector('#mi-video');
              
              if (videoEl && htmlVideo) {
                videoEl.setAttribute('visible', 'true');
                htmlVideo.play();
                
                // NUEVO: Marcamos el video como "desbloqueado" para el autoplay futuro
                htmlVideo.dataset.desbloqueado = "true";
              }

              // 4. Reemplazamos protex.glb por protex3.glb
              const protexOriginal = document.querySelector('#modelo-protex1');
              const protexNuevo = document.querySelector('#modelo-protex3');
              
              if (protexOriginal && protexNuevo) {
                protexOriginal.setAttribute('visible', 'false'); // Ocultamos el original
                protexNuevo.setAttribute('visible', 'true');     // Mostramos el nuevo
              }
            }
          });
        }
      });
    </script>
    
  </head>

  <body>
    
    <div id="welcome-screen">
      <img src="protex.png" alt="Portada" id="portada-img">
      
      <div class="ui-container">
        <div id="loading-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <button id="startButton">Toca aquí para comenzar</button>

        <div id="countdown-text"></div>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
    <a-assets>
      <video id="mi-video" src="./protex.mp4" preload="auto" loop crossorigin="anonymous" webkit-playsinline playsinline></video>
      <a-asset-item id="modelo3D" src="./protex.glb"></a-asset-item>
      <a-asset-item id="modelo3D_2" src="./protex2.glb"></a-asset-item>
      <a-asset-item id="modelo3D_3" src="./protex3.glb"></a-asset-item>
      
      <a-asset-item id="modeloMano" src="./mano.glb"></a-asset-item>
      
      <audio id="mi-sonido" src="./sonido.mp3" preload="auto"></audio>
      
      <img id="img1" src="./imagen1.jpg">
      <img id="img2" src="./imagen2.jpg">
      <img id="img3" src="./imagen3.jpg">
      <img id="img4" src="./imagen4.jpg">
    </a-assets>

      <a-light type="ambient" color="#FFF" intensity="1"></a-light>
      <a-light type="directional" color="#FFF" intensity="1.5" position="-1 2 1"></a-light>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image id="fondo-imagen" src="#img1" width="1" height="1" position="0 0 0"></a-image>

        <a-video id="a-video-entity" src="#mi-video" width="1" height="0.5625" position="0 0.25 0.01" visible="false"></a-video>  
        
        <a-entity id="modelo-protex1" gltf-model="#modelo3D" scale="0.75 0.75 0.40" position="-0.2 -0.5 0.4" animation-mixer></a-entity>         
        
        <a-entity id="modelo-protex3" gltf-model="#modelo3D_3" scale="0.75 0.75 0.40" position="0 -0.5 0.6" visible="false" animation-mixer></a-entity> 

        <a-entity id="contenedor-modelo2" position="-0.2 0 0.4">
          <a-box class="clickable" atrapar-modelo width="2" height="2" depth="2" material="opacity: 0; transparent: true"></a-box>
          <a-entity gltf-model="#modelo3D_2" scale="0.6 0.6 0.3" position="0 0.1 0" animation-mixer></a-entity>
          
          <a-entity id="modelo-mano" gltf-model="#modeloMano" scale="0.02 0.02 0.02" position="0.1 0.1 0.1" rotation="45 180 180" animation-mixer></a-entity>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      const welcomeScreen = document.getElementById('welcome-screen');
      const startButton = document.getElementById('startButton');
      const loadingDots = document.getElementById('loading-dots');
      const countdownText = document.getElementById('countdown-text');
      const video = document.getElementById('mi-video');
      const target = document.querySelector('[mindar-image-target]');

      setTimeout(() => {
        loadingDots.style.display = 'none';
        startButton.style.display = 'block';
      }, 3000);

      startButton.addEventListener('click', function () {
        video.play().then(() => {
           video.pause();
           video.currentTime = 0; 
        }).catch(e => console.log("Interacción de usuario necesaria para video."));

        startButton.style.display = 'none';
        countdownText.style.display = 'block';

        const sequence = ["3", "2", "1", "¡Explora!"];
        let step = 0;

        function nextStep() {
          if (step < sequence.length) {
            countdownText.innerText = sequence[step];
            countdownText.className = '';
            void countdownText.offsetWidth; 

            if (step === sequence.length - 1) {
              countdownText.style.fontSize = "50px"; 
              countdownText.classList.add('zoom-out');
              
              setTimeout(() => {
                welcomeScreen.style.opacity = '0';
                setTimeout(() => {
                  welcomeScreen.style.display = 'none';
                }, 500); 
              }, 1000); 

            } else {
              countdownText.classList.add('bounce');
              setTimeout(nextStep, 1000); 
            }
            step++;
          }
        }
        nextStep();
      });

      // Pausar el video si se pierde el target
      target.addEventListener("targetLost", () => video.pause());

      // NUEVO: Reanudar el video solo si la bandera "desbloqueado" es true
      target.addEventListener("targetFound", () => {
        if (video.dataset.desbloqueado === "true") {
          video.play();
        }
      });

      window.addEventListener('orientationchange', () => {
        setTimeout(() => window.dispatchEvent(new Event('resize')), 300); 
      });

    </script>
  </body>
</html>
