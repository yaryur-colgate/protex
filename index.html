<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara Trasera y Carga Rápida</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
            color: #333;
            text-align: center;
        }

        /* Cambiamos el color a un azul oscuro */
        h1 { font-size: 4rem; color: #002B5B; margin-bottom: 0.5rem; letter-spacing: 2px; }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: background-color 0.3s ease;
        }

        #btn-mostrar { background-color: #3498db; }
        #btn-mostrar:hover { background-color: #2980b9; }

        #btn-camara { background-color: #2ecc71; }
        #btn-camara:hover { background-color: #27ae60; }

        #video-camara {
            display: none; 
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #pagina-oculta-iframe {
            display: none;
            width: 100vw;
            height: 100vh;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0; 
            transition: opacity 0.5s ease;
        }

        #overlay-experiencia {
            display: none; 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none; 
        }

        /* ESTILOS DE LA PÍLDORA Y TEXTOS */
        .pildora {
            background-color: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Clase para los números (sin fondo, color azul oscuro) */
        .solo-texto {
            background-color: transparent;
            color: #002B5B;
            font-size: 6rem; /* Hacemos los números más grandes para que destaquen */
            font-weight: bold;
            box-shadow: none;
            padding: 0;
        }

        #texto-overlay {
            display: inline-block; /* Necesario para que el transform funcione en el span */
        }

        /* ANIMACIONES */
        @keyframes rebote-numero {
            0% { transform: scale(1); }
            30% { transform: scale(1.4); }
            50% { transform: scale(0.9); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .animar-rebote {
            animation: rebote-numero 0.5s ease-in-out;
        }

        @keyframes rebote-final-explora {
            0% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .animar-final {
            animation: rebote-final-explora 1s forwards; /* forwards mantiene el estado final (invisible) */
        }

    </style>
</head>
<body>

    <div id="contenedor-principal">
        <h1>PROTEX</h1>
        
        <div style="display: none;">
            <button id="btn-mostrar">Ver contenido cargado</button>
            <button id="btn-camara">Encender Cámara Trasera</button>
        </div>

        <video id="video-camara" autoplay playsinline></video>
    </div>

    <div id="overlay-experiencia">
        <div class="pildora" id="pildora-ui">
            <span id="texto-overlay">Toca aquí para comenzar la experiencia</span>
        </div>
    </div>

    <iframe id="pagina-oculta-iframe" src="https://mywebar.com/p/YarYurProtex" allow="camera; microphone"></iframe>

    <script>
        // --- LÓGICA DEL IFRAME OCULTO Y CUENTA REGRESIVA ---
        const btnMostrar = document.getElementById('btn-mostrar');
        const contenedorPrincipal = document.getElementById('contenedor-principal');
        const iframeOculto = document.getElementById('pagina-oculta-iframe');
        
        // Elementos nuevos
        const overlayExperiencia = document.getElementById('overlay-experiencia');
        const textoOverlay = document.getElementById('texto-overlay');
        const pildoraUI = document.getElementById('pildora-ui');

        btnMostrar.addEventListener('click', () => {
            contenedorPrincipal.style.display = 'none';
            iframeOculto.style.display = 'block';
            
            // Mostramos la píldora con el texto inicial
            overlayExperiencia.style.display = 'block';
            
            window.addEventListener('blur', () => {
                if (document.activeElement === iframeOculto) {
                    
                    let contador = 5;
                    
                    // Cambiamos el estilo a solo texto para los números
                    pildoraUI.classList.remove('pildora');
                    pildoraUI.classList.add('solo-texto');

                    // Función para actualizar y forzar el reinicio de la animación
                    const actualizarContador = (num) => {
                        textoOverlay.textContent = num;
                        textoOverlay.classList.remove('animar-rebote');
                        // Forzamos un 'reflow' para que el navegador reinicie la animación CSS
                        void textoOverlay.offsetWidth;
                        textoOverlay.classList.add('animar-rebote');
                    };

                    actualizarContador(contador); 
                    
                    const intervalo = setInterval(() => {
                        contador--;
                        
                        if (contador > 0) {
                            actualizarContador(contador);
                        } else {
                            clearInterval(intervalo); 
                            
                            // Restauramos el estilo de píldora para "¡Explora!"
                            pildoraUI.classList.remove('solo-texto');
                            pildoraUI.classList.add('pildora');
                            textoOverlay.classList.remove('animar-rebote');
                            
                            textoOverlay.textContent = "¡Explora!";
                            
                            // Aplicamos la animación de crecimiento y desvanecimiento al contenedor completo
                            pildoraUI.classList.add('animar-final');
                            
                            iframeOculto.style.opacity = '1'; 
                            
                            // Esperamos a que termine la animación final para ocultar el overlay
                            setTimeout(() => {
                                overlayExperiencia.style.display = 'none';
                            }, 1000); // 1000ms coincide con la duración de 'rebote-final-explora'
                        }
                    }, 1000); 
                }
            }, { once: true });
        });

        // --- LÓGICA DE LA CÁMARA TRASERA ---
        const btnCamara = document.getElementById('btn-camara');
        const videoCamara = document.getElementById('video-camara');

        btnCamara.addEventListener('click', async () => {
            try {
                const restricciones = {
                    video: {
                        facingMode: "environment"
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(restricciones);
                
                videoCamara.srcObject = stream;
                videoCamara.style.display = 'block';
                
                btnCamara.textContent = "Cámara Trasera Activa";
                btnCamara.disabled = true;
                btnCamara.style.backgroundColor = "#95a5a6";
                btnCamara.style.cursor = "default";

            } catch (error) {
                alert('No se pudo acceder a la cámara trasera. Asegúrate de estar en un dispositivo móvil o de tener una conectada.');
                console.error('Error de cámara:', error);
            }
        });

        // --- AUTOCLIC DESPUÉS DE 1 SEGUNDO ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                btnMostrar.click();
            }, 1000); // 1000 ms = 1 segundo
        });
    </script>

</body>
</html>
