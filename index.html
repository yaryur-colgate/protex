<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colgate</title>
    <!-- Importamos Tailwind CSS para darle estilo rápidamente -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importamos una fuente de Google Fonts parecida a la de la marca -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            /* Aplicamos la fuente importada */
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<!-- 
  Clases de Tailwind utilizadas:
  bg-[#E3000F]: Color rojo estilo Colgate
  h-screen: Ocupa toda la altura de la pantalla
  w-full: Ocupa todo el ancho
  flex items-center justify-center: Centra el contenido vertical y horizontalmente
-->
<body class="bg-[#E3000F] h-screen w-full flex items-center justify-center m-0 overflow-hidden">
    
    <!-- 
      text-white: Texto blanco
      text-7xl md:text-9xl: Tamaño de texto muy grande y responsivo
      font-extrabold: Letra muy gruesa
      tracking-tighter: Letras un poco más juntas (como en el logo real)
    -->
    <h1 class="text-white text-7xl md:text-[12rem] font-extrabold tracking-tighter select-none">
        Colgate
    </h1>

</body>
</html>
